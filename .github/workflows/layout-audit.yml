name: Layout Audit

on:
  push:
    branches: [main]
    paths:
      - 'app/src/**/*.tsx'
      - 'app/src/**/*.ts'
      - 'app/src/**/*.css'
      - 'e2e/**/*.ts'
      - 'scripts/lint-layout.mjs'
      - 'playwright.config.ts'
  pull_request:
    branches: [main]

jobs:
  static-lint:
    name: 静态布局 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 运行静态布局 Lint
        run: node scripts/lint-layout.mjs

  runtime-audit:
    name: 运行时布局审计
    runs-on: ubuntu-latest
    needs: static-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 安装依赖
        run: |
          npm ci
          npm --prefix app ci
          npm --prefix server ci
      - name: 构建前端
        run: npm run build
      - name: Seed 数据
        run: npm run seed
      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
      - name: 运行布局审计测试
        run: npx playwright test layout-audit.spec.ts
      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-audit-report
          path: playwright-report/
          retention-days: 7
