<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chrono Atlas" />
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="探索两万年人类文明时间线 — Chrono Atlas" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Chrono Atlas - 文明时间线</title>
  </head>
  <body>
    <div id="root">
      <!-- Pre-render loading: 在 JS bundle 下载和 React hydrate 之前显示 -->
      <style>
        .preload-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a14;color:#a1a1aa;font-family:system-ui,-apple-system,sans-serif;transition:opacity .4s}
        .preload-logo{width:48px;height:48px;animation:preloadPulse 2s ease-in-out infinite}
        .preload-title{font-size:20px;font-weight:700;color:#fafafa;margin-top:12px;letter-spacing:-.02em}
        .preload-sub{font-size:12px;color:#71717a;margin-top:4px}
        .preload-bar-wrap{width:256px;height:6px;border-radius:999px;background:#27272a;margin-top:24px;overflow:hidden}
        .preload-bar{width:30%;height:100%;border-radius:999px;background:linear-gradient(90deg,#8b5cf6,#f59e0b);animation:preloadBar 2s ease-in-out infinite}
        @keyframes preloadPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
        @keyframes preloadBar{0%{width:10%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:10%;margin-left:90%}}
        @media(prefers-color-scheme:light){.preload-screen{background:#fff}.preload-title{color:#09090b}.preload-sub{color:#a1a1aa}.preload-bar-wrap{background:#e4e4e7}}
      </style>
      <div class="preload-screen" id="preload">
        <img src="/logo.svg" alt="" class="preload-logo" />
        <div class="preload-title">Chrono Atlas</div>
        <div class="preload-sub">Loading the timeline of human civilization...</div>
        <div class="preload-bar-wrap"><div class="preload-bar"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
